<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your LUXE account password. Enter your email to receive a password reset link.">
  <title>Forgot Password — LUXE Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-visual">
      <div class="auth-visual__content">
        <a href="index.html" class="auth-visual__logo">LU<span>X</span>E</a>
        <h2 class="auth-visual__title">Don't Worry</h2>
        <p class="auth-visual__desc">It happens to the best of us. Enter your email and we'll send you a link to reset your password in no time.</p>
      </div>
    </div>
    <div class="auth-form-wrapper">
      <div class="auth-form">
        <a href="login.html" class="auth-back"><i class="ri-arrow-left-line"></i> Back to Sign In</a>
        <div class="auth-form__header">
          <h1 class="auth-form__title">Forgot Password?</h1>
          <p class="auth-form__subtitle">Enter your email address and we'll send you a password reset link.</p>
        </div>
        <form>
          <div class="form-group">
            <label class="form-label" for="resetEmail">Email Address</label>
            <input type="email" class="form-input" id="resetEmail" required placeholder="you@example.com">
            <p class="form-error">Please enter a valid email address</p>
          </div>
          <button type="submit" class="btn btn--accent btn--lg auth-form__submit">Send Reset Link</button>
          <p class="auth-form__switch">Remember your password? <a href="login.html">Sign in</a></p>
        </form>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
